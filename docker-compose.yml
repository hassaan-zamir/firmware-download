services:
  app:
    build: .
    ports:
      - "8080:80"
    environment:
      - APP_ENV=prod
      - APP_SECRET=change-me-to-a-secure-random-string
      - DATABASE_URL=sqlite:///%kernel.project_dir%/var/data.db
    volumes:
      - sqlite_data:/var/www/html/var
    restart: unless-stopped

volumes:
  sqlite_data:
